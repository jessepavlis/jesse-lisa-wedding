<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RSVP — Lisa & Jesse</title>
  <link rel="stylesheet" href="/wedding/css/style.css" />
  <script src="/wedding/js/config.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400&display=swap" rel="stylesheet"/>
</head>
<body data-wc-title="RSVP">

  <nav>
    <ul>
      <li><a href="/wedding">Home</a></li>
      <li><a href="/wedding/venue">Venue</a></li>
      <li><a href="/wedding/registry">Registry</a></li>
      <li><a href="/wedding/rsvp" class="active">RSVP</a></li>
    </ul>
  </nav>

  <main class="page-main">
    <header class="page-header">
      <p class="page-eyebrow">Please respond by <span data-wc="rsvpBy">July 1, 2026</span></p>
      <h1>RSVP</h1>
    </header>

    <section class="rsvp-section">
      <div id="rsvp-form-wrap">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" placeholder="Your full name" />
        </div>

        <div class="form-group">
          <label for="email">Email Address <span class="optional">(optional)</span></label>
          <input type="email" id="email" placeholder="your@email.com" />
        </div>

        <div class="form-group">
          <label>Will you be attending?</label>
          <div class="radio-group">
            <label class="radio-label">
              <input type="radio" name="attending" value="yes" /> Joyfully accepts
            </label>
            <label class="radio-label">
              <input type="radio" name="attending" value="no" /> Regretfully declines
            </label>
          </div>
        </div>

        <div class="form-group" id="guests-group">
          <label for="guests">Number of Guests (including yourself)</label>
          <select id="guests">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
          </select>
        </div>

        <div class="form-group" id="dietary-group">
          <label for="dietary">Dietary Restrictions or Allergies</label>
          <input type="text" id="dietary" placeholder="None, vegetarian, gluten-free, etc." />
        </div>

        <div class="form-group">
          <label for="note">A Note for the Couple <span class="optional">(optional)</span></label>
          <textarea id="note" rows="3" placeholder="Share a message, song request, or well wishes..."></textarea>
        </div>

        <button class="btn-primary" id="submit-btn" onclick="submitRSVP()">Send RSVP</button>
        <p class="form-error" id="form-error"></p>
      </div>

      <div id="rsvp-success" class="rsvp-success" style="display:none;">
        <div class="success-icon">✦</div>
        <h2>Thank you!</h2>
        <p id="success-message">We've received your RSVP and can't wait to celebrate with you.</p>
        <a href="index.html" class="btn-outline" style="margin-top:2rem;">Back to Home</a>
      </div>
    </section>
  </main>

  <footer>
    <p data-wc="footer">Lisa & Jesse · August 22, 2026</p>
  </footer>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // ─── REPLACE THESE WITH YOUR FIREBASE CONFIG ───────────────────────────────
    const firebaseConfig = {
    apiKey: "AIzaSyAvc4lTGu0bLa68GQRfP4L1JkncKwCs3Us",
    authDomain: "jesse-lisa-wedding.firebaseapp.com",
    projectId: "jesse-lisa-wedding",
    storageBucket: "jesse-lisa-wedding.firebasestorage.app",
    messagingSenderId: "471909172891",
    appId: "1:471909172891:web:23af9d0bebb19aa312a83e",
    measurementId: "G-2LWV3LNJFX"
  };
    // ───────────────────────────────────────────────────────────────────────────

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.submitRSVP = async function () {
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const attendingEl = document.querySelector('input[name="attending"]:checked');
      const guests = document.getElementById('guests').value;
      const dietary = document.getElementById('dietary').value.trim();
      const note = document.getElementById('note').value.trim();
      const errorEl = document.getElementById('form-error');
      const btn = document.getElementById('submit-btn');

      errorEl.textContent = '';

      if (!name) { errorEl.textContent = 'Please enter your name.'; return; }
      if (email && !email.includes('@')) { errorEl.textContent = 'Please enter a valid email.'; return; }
      if (!attendingEl) { errorEl.textContent = 'Please select whether you\'ll be attending.'; return; }

      const attending = attendingEl.value;

      btn.textContent = 'Sending...';
      btn.disabled = true;

      try {
        await addDoc(collection(db, 'rsvps'), {
          name,
          email,
          attending,
          guests: attending === 'yes' ? parseInt(guests) : 0,
          dietary: attending === 'yes' ? dietary : '',
          note,
          submittedAt: serverTimestamp()
        });

        document.getElementById('rsvp-form-wrap').style.display = 'none';
        document.getElementById('rsvp-success').style.display = 'flex';

        if (attending === 'no') {
          document.getElementById('success-message').textContent =
            'We\'ll miss you, but thank you for letting us know.';
        }

      } catch (err) {
        console.error(err);
        errorEl.textContent = 'Something went wrong. Please try again.';
        btn.textContent = 'Send RSVP';
        btn.disabled = false;
      }
    };

    // Show/hide guest & dietary fields based on attendance
    document.querySelectorAll('input[name="attending"]').forEach(el => {
      el.addEventListener('change', () => {
        const show = el.value === 'yes';
        document.getElementById('guests-group').style.display = show ? 'block' : 'none';
        document.getElementById('dietary-group').style.display = show ? 'block' : 'none';
      });
    });
  </script>
</body>
</html>
