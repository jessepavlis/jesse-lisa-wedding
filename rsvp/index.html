<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RSVP — Jesse & Lisa</title>
  <link rel="stylesheet" href="/wedding/css/style.css" />
  <script src="/wedding/js/config.js"></script>
  <script src="/wedding/js/sparkles.js"></script>
</head>
<body data-wc-title="RSVP">

  <nav>
    <ul>
      <li><a href="/wedding">Home</a></li>
      <li><a href="/wedding/venue">Venue</a></li>
      <li><a href="/wedding/amenities">Amenities</a></li>
      <li><a href="/wedding/registry">Registry</a></li>
      <li><a href="/wedding/rsvp" class="active">RSVP</a></li>
    </ul>
  </nav>

  <main class="page-main">
    <header class="page-header">
      <p class="page-eyebrow">Coming soon</p>
      <h1>RSVP</h1>
      <p class="page-subtitle">RSVPs will open shortly. Please check back soon.</p>
    </header>
    </section>
  </main>

  <footer>
    <p data-wc="footer">Jesse & Lisa · August 22, 2026</p>
  </footer>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { initializeAppCheck, ReCaptchaV3Provider } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app-check.js";

    // ─── REPLACE THESE WITH YOUR FIREBASE CONFIG ───────────────────────────────
    const firebaseConfig = {
    apiKey: "AIzaSyAvc4lTGu0bLa68GQRfP4L1JkncKwCs3Us",
    authDomain: "jesse-lisa-wedding.firebaseapp.com",
    projectId: "jesse-lisa-wedding",
    storageBucket: "jesse-lisa-wedding.firebasestorage.app",
    messagingSenderId: "471909172891",
    appId: "1:471909172891:web:23af9d0bebb19aa312a83e",
    measurementId: "G-2LWV3LNJFX"
  };
    // ───────────────────────────────────────────────────────────────────────────

    const app = initializeApp(firebaseConfig);
    if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
      self.FIREBASE_APPCHECK_DEBUG_TOKEN = true;
    }
    initializeAppCheck(app, {
      provider: new ReCaptchaV3Provider('6Lc37-QsAAAAAF6Qq_4Lm-1k3i0VpUJ-ByYeuvPv'),
      isTokenAutoRefreshEnabled: true
    });
    const db = getFirestore(app);

    const mealOptions = [
      { value: 'Grilled Beef Ribeye',           name: 'Grilled Beef Ribeye',           sauce: 'Mushroom Jus' },
      { value: 'Pan Seared Salmon',              name: 'Pan Seared Salmon',              sauce: 'Citrus Butter Cream' },
      { value: "Eichner's Farm Chicken Breast",  name: "Eichner's Farm Chicken Breast",  sauce: 'Whole Grain Mustard Demi' },
      { value: 'Vegetarian Feast of the Season', name: 'Vegetarian Feast of the Season', sauce: null },
    ];

    function optionHTML(opt) {
      return `<span class="meal-option-name">${opt.name}</span>${opt.sauce ? `<span class="meal-option-sauce">${opt.sauce}</span>` : ''}`;
    }

    function renderMealChoices(count) {
      const container = document.getElementById('meal-choices-container');
      container.innerHTML = '';
      for (let i = 1; i <= count; i++) {
        const label = i === 1 ? 'Your meal' : `Guest ${i} meal`;
        const group = document.createElement('div');
        group.className = 'meal-guest-group';

        const labelEl = document.createElement('label');
        labelEl.textContent = label;

        const wrap = document.createElement('div');
        wrap.className = 'meal-select';
        wrap.dataset.value = '';

        const trigger = document.createElement('button');
        trigger.type = 'button';
        trigger.className = 'meal-select-trigger';
        trigger.innerHTML = '<span class="meal-select-placeholder">Select a meal</span>';

        const dropdown = document.createElement('div');
        dropdown.className = 'meal-select-dropdown';

        mealOptions.forEach(opt => {
          const item = document.createElement('div');
          item.className = 'meal-option';
          item.dataset.value = opt.value;
          item.innerHTML = optionHTML(opt);
          item.addEventListener('click', () => {
            wrap.dataset.value = opt.value;
            trigger.innerHTML = optionHTML(opt);
            trigger.classList.add('has-value');
            dropdown.classList.remove('open');
          });
          dropdown.appendChild(item);
        });

        trigger.addEventListener('click', e => {
          e.stopPropagation();
          document.querySelectorAll('.meal-select-dropdown.open').forEach(d => {
            if (d !== dropdown) d.classList.remove('open');
          });
          dropdown.classList.toggle('open');
        });

        wrap.appendChild(trigger);
        wrap.appendChild(dropdown);
        group.appendChild(labelEl);
        group.appendChild(wrap);
        container.appendChild(group);
      }
    }

    document.addEventListener('click', () => {
      document.querySelectorAll('.meal-select-dropdown.open').forEach(d => d.classList.remove('open'));
    });

    window.submitRSVP = async function () {
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const attendingEl = document.querySelector('input[name="attending"]:checked');
      const guests = document.getElementById('guests').value;
      const errorEl = document.getElementById('form-error');
      const btn = document.getElementById('submit-btn');

      errorEl.textContent = '';

      if (!name) { errorEl.textContent = 'Please enter your name.'; return; }
      if (email && !email.includes('@')) { errorEl.textContent = 'Please enter a valid email.'; return; }
      if (!attendingEl) { errorEl.textContent = 'Please select whether you\'ll be attending.'; return; }

      const attending = attendingEl.value;

      let mealChoices = [];
      if (attending === 'yes') {
        mealChoices = Array.from(document.querySelectorAll('.meal-select')).map((el, i) => ({
          guest: i + 1,
          meal: el.dataset.value
        }));
        if (mealChoices.some(m => !m.meal)) {
          errorEl.textContent = 'Please select a meal for each guest.';
          return;
        }
      }

      btn.textContent = 'Sending...';
      btn.disabled = true;

      try {
        await addDoc(collection(db, 'rsvps'), {
          name,
          email,
          attending,
          guests: attending === 'yes' ? parseInt(guests) : 0,
          mealChoices,
          submittedAt: serverTimestamp()
        });

        document.getElementById('rsvp-form-wrap').style.display = 'none';
        document.getElementById('rsvp-success').style.display = 'flex';

        if (attending === 'no') {
          document.getElementById('success-message').textContent =
            'We\'ll miss you, but thank you for letting us know.';
        }

      } catch (err) {
        console.error(err);
        errorEl.textContent = 'Something went wrong. Please try again.';
        btn.textContent = 'Send RSVP';
        btn.disabled = false;
      }
    };

    // Show/hide guest & meal fields based on attendance
    document.querySelectorAll('input[name="attending"]').forEach(el => {
      el.addEventListener('change', () => {
        const show = el.value === 'yes';
        document.getElementById('guests-group').style.display = show ? 'block' : 'none';
        document.getElementById('meal-choices-group').style.display = show ? 'block' : 'none';
        if (show) renderMealChoices(parseInt(document.getElementById('guests').value));
      });
    });

    // Re-render meal selectors when guest count changes
    document.getElementById('guests').addEventListener('change', function () {
      renderMealChoices(parseInt(this.value));
    });
  </script>
</body>
</html>
