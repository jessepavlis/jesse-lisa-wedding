<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Jesse & Lisa — August 22, 2026</title>
  <link rel="stylesheet" href="/wedding/css/style.css" />
  <script src="/wedding/js/config.js"></script>
  <script src="/wedding/js/sparkles.js"></script>
</head>
<body class="home-page">

  <nav>
    <ul>
      <li><a href="/wedding" class="active">Home</a></li>
      <!-- Venue temporarily disabled -->
      <!-- Amenities temporarily disabled -->
      <li><a href="/wedding/registry">Registry</a></li>
      <!-- RSVP temporarily disabled -->
    </ul>
  </nav>

  <main class="hero">
    <div class="hero-inner">
      <p class="hero-eyebrow">We're getting married</p>
      <img src="/wedding/images/text/lisa%26jesse_nobkgd.svg" alt="Lisa &amp; Jesse" class="hero-names-img" />
      <p class="hero-date" data-wc="date">August 22, 2026</p>
      <p class="hero-time">3:00 PM</p>
      <div class="hero-divider"></div>
      <p class="hero-venue" data-wc="venueLine">The Hyeholde · <span class="hero-venue-location">Coraopolis, Pa</span></p>
      <!-- RSVP button temporarily disabled -->
    </div>
    <div class="countdown" id="countdown">
      <div class="countdown-item"><span id="cd-days">--</span><label>Days</label></div>
      <div class="countdown-sep">·</div>
      <div class="countdown-item"><span id="cd-hours">--</span><label>Hours</label></div>
      <div class="countdown-sep">·</div>
      <div class="countdown-item"><span id="cd-minutes">--</span><label>Minutes</label></div>
    </div>
  </main>

  <footer>
    <p data-wc="footer">Jesse & Lisa · August 22, 2026</p>
  </footer>

  <script>
    function updateCountdown() {
      const wedding = new Date(WEDDING.countdownTarget);
      const now = new Date();
      const diff = wedding - now;
      if (diff <= 0) {
        document.getElementById('countdown').style.display = 'none';
        return;
      }
      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      document.getElementById('cd-days').textContent = days;
      document.getElementById('cd-hours').textContent = hours;
      document.getElementById('cd-minutes').textContent = minutes;
    }
    updateCountdown();
    setInterval(updateCountdown, 60000);
  </script>
</body>
</html>
